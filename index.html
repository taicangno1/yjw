<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>放置三国</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }
        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="js/managers/GameManager.js"></script>
    <script src="js/managers/DataManager.js"></script>
    <script src="js/managers/BattleManager.js"></script>
    <script src="js/managers/OfflineManager.js"></script>
    <script src="js/managers/AudioManager.js"></script>
    <script src="js/managers/AdManager.js"></script>
    <script src="js/data/PlayerData.js"></script>
    <script src="js/entities/Hero.js"></script>
    <script src="js/utils/BattleUtils.js"></script>
    <script src="js/utils/Storage.js"></script>
    <script src="js/utils/AssetGenerator.js"></script>
    <script src="js/scenes/BootScene.js"></script>
    <script src="js/scenes/PreloadScene.js"></script>
    <script src="js/scenes/MainCityScene.js"></script>
    <script src="js/scenes/BattleScene.js"></script>
    <script src="js/scenes/LevelSelectScene.js"></script>
    <script src="js/scenes/HeroListScene.js"></script>
    <script src="js/scenes/OfflineEarningsScene.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
