<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>名字大宗师 - 周易起名</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e8e8e8;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 16px; }
        header { text-align: center; padding: 20px 0; }
        .logo { font-size: 40px; margin-bottom: 8px; }
        h1 {
            font-size: 24px;
            background: linear-gradient(90deg, #f6d365, #fda085);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { color: #888; margin-top: 4px; font-size: 12px; }
        .card {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .section-title {
            font-size: 16px;
            color: #f6d365;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-group { margin-bottom: 14px; }
        label { display: block; margin-bottom: 6px; color: #aaa; font-size: 13px; }
        input, select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus, select:focus { border-color: #f6d365; }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f6d365, #fda085);
            color: #1a1a2e;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(246,211,101,0.3); }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 13px;
            padding: 8px 12px;
            width: auto;
        }
        .btn-small {
            font-size: 12px;
            padding: 6px 10px;
            width: auto;
        }
        .result { display: none; margin-top: 16px; }
        .result.show { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bazi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 14px; }
        .bazi-item { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 10px 6px; text-align: center; }
        .bazi-label { font-size: 10px; color: #888; margin-bottom: 3px; }
        .bazi-value { font-size: 16px; color: #f6d365; font-weight: bold; }
        .wuxing-bar { display: flex; height: 20px; border-radius: 10px; overflow: hidden; margin: 10px 0; background: rgba(0,0,0,0.3); }
        .wuxing-segment { display: flex; align-items: center; justify-content: center; font-size: 11px; color: #1a1a2e; font-weight: bold; }
        .wuxing-label { display: flex; justify-content: space-around; margin-top: 6px; }
        .wuxing-label span { font-size: 11px; color: #888; }
        .gua-info { text-align: center; padding: 16px; background: rgba(246,211,101,0.1); border-radius: 12px; margin-bottom: 14px; }
        .gua-name { font-size: 28px; color: #f6d365; margin-bottom: 6px; }
        .gua-desc { color: #aaa; font-size: 13px; line-height: 1.5; }
        .name-suggestion { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 14px; margin-bottom: 10px; position: relative; }
        .name-suggestion h4 { color: #f6d365; margin-bottom: 6px; font-size: 18px; display: flex; align-items: center; justify-content: space-between; }
        .name-score { display: inline-block; background: linear-gradient(135deg, #4ade80, #22c55e); color: #1a1a2e; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .score-detail { font-size: 11px; color: #888; margin-top: 4px; }
        .tab-nav { display: flex; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 4px; margin-bottom: 14px; }
        .tab-btn { flex: 1; padding: 8px; border: none; background: none; color: #888; font-size: 13px; cursor: pointer; border-radius: 8px; transition: all 0.3s; }
        .tab-btn.active { background: rgba(246,211,101,0.2); color: #f6d365; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .santi-result { font-size: 12px; }
        .santi-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .santi-item:last-child { border-bottom: none; }
        .santi-name { color: #ddd; }
        .santi-score { font-weight: bold; }
        .santi-score.ji { color: #4ade80; }
        .santi-score.xiong { color: #ef4444; }
        .santi-score.ping { color: #facc15; }
        footer { text-align: center; padding: 16px; color: #666; font-size: 11px; }
        
        .action-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .history-item { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 10px; margin-bottom: 8px; cursor: pointer; transition: background 0.2s; }
        .history-item:hover { background: rgba(255,255,255,0.1); }
        .history-item .name { color: #f6d365; font-size: 15px; }
        .history-item .date { color: #666; font-size: 11px; margin-top: 4px; }
        
        .compare-section { margin-top: 12px; }
        .compare-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 8px; }
        .compare-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: #f6d365; }
        .compare-name { color: #f6d365; font-size: 15px; }
        .compare-delete { color: #ef4444; cursor: pointer; margin-left: 8px; }
        
        .share-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .share-modal.show { display: flex; }
        .share-content { background: #1a1a2e; border-radius: 16px; padding: 24px; max-width: 320px; width: 90%; }
        .share-title { color: #f6d365; margin-bottom: 16px; text-align: center; }
        .share-text { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; font-size: 13px; color: #aaa; word-break: break-all; margin-bottom: 16px; max-height: 200px; overflow-y: auto; }
        .share-buttons { display: flex; gap: 8px; }
        .share-buttons .btn { flex: 1; font-size: 14px; padding: 10px; }
        
        .filter-section { margin-bottom: 14px; }
        .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-btn { padding: 6px 12px; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; background: none; color: #888; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .filter-btn.active { background: rgba(246,211,101,0.2); border-color: #f6d365; color: #f6d365; }
        
        .bazi-detail { margin-top: 12px; }
        .bazi-detail-item { display: flex; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 12px; }
        .bazi-detail-item:last-child { border-bottom: none; }
        .bazi-detail-label { color: #888; width: 60px; }
        .bazi-detail-value { color: #f6d365; }
        
        .poem-section { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 12px; margin-top: 10px; }
        .poem-title { color: #f6d365; font-size: 13px; margin-bottom: 4px; }
        .poem-content { color: #aaa; font-size: 12px; line-height: 1.6; font-style: italic; }
        
        .yinwin-badge { display: inline-block; background: linear-gradient(135deg, #a78bfa, #8b5cf6); color: #fff; padding: 1px 6px; border-radius: 4px; font-size: 10px; margin-left: 6px; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 1001; opacity: 0; transition: opacity 0.3s; }
        .toast.show { opacity: 1; }
        
        .nav-bar { display: flex; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 4px; margin-bottom: 16px; }
        .nav-btn { flex: 1; padding: 8px; border: none; background: none; color: #888; font-size: 13px; cursor: pointer; border-radius: 8px; text-align: center; }
        .nav-btn.active { background: rgba(246,211,101,0.2); color: #f6d365; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">&#127800;</div>
            <h1>名字大宗师</h1>
            <p class="subtitle">周易起名 | 八字五行 | 三才五格</p>
        </header>

        <div class="nav-bar">
            <button class="nav-btn active" onclick="switchNav('input')">起名</button>
            <button class="nav-btn" onclick="switchNav('history')">历史</button>
            <button class="nav-btn" onclick="switchNav('compare')">对比</button>
            <button class="nav-btn" onclick="switchNav('poem')">诗词</button>
        </div>

        <div id="page-input">
            <div class="card">
                <div class="section-title">&#128197; 出生信息</div>
                <div class="form-group">
                    <label>姓氏</label>
                    <input type="text" id="surname" placeholder="请输入姓氏，如：张" maxlength="2">
                </div>
                <div class="form-group">
                    <label>出生日期（阳历）</label>
                    <input type="date" id="birthDate">
                </div>
                <div class="form-group">
                    <label>出生时辰</label>
                    <select id="birthHour">
                        <option value="">请选择时辰</option>
                        <option value="子">子时 (23:00-00:59)</option>
                        <option value="丑">丑时 (01:00-02:59)</option>
                        <option value="寅">寅时 (03:00-04:59)</option>
                        <option value="卯">卯时 (05:00-06:59)</option>
                        <option value="辰">辰时 (07:00-08:59)</option>
                        <option value="巳">巳时 (09:00-10:59)</option>
                        <option value="午">午时 (11:00-12:59)</option>
                        <option value="未">未时 (13:00-14:59)</option>
                        <option value="申">申时 (15:00-16:59)</option>
                        <option value="酉">酉时 (17:00-18:59)</option>
                        <option value="戌">戌时 (19:00-20:59)</option>
                        <option value="亥">亥时 (21:00-22:59)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select id="gender">
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="generateName()">&#128640; 开始起名</button>
            </div>

            <div class="result" id="result">
                <div class="card">
                    <div class="section-title">&#9878; 八字命盘</div>
                    <div class="bazi-grid" id="baziGrid"></div>
                    <div class="wuxing-bar" id="wuxingBar"></div>
                    <div class="wuxing-label" id="wuxingLabel"></div>
                    <div class="bazi-detail" id="baziDetail"></div>
                </div>

                <div class="card">
                    <div class="section-title">&#9830; 周易卦象</div>
                    <div class="gua-info">
                        <div class="gua-name" id="guaName"></div>
                        <div class="gua-desc" id="guaDesc"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="section-title">&#9733; 名字推荐</div>
                    <div class="filter-section">
                        <div class="filter-row" id="filterRow"></div>
                    </div>
                    <div id="nameList"></div>
                </div>
            </div>
        </div>

        <div id="page-history" class="hidden">
            <div class="card">
                <div class="section-title">&#128197; 起名历史</div>
                <div id="historyList"></div>
            </div>
        </div>

        <div id="page-compare" class="hidden">
            <div class="card">
                <div class="section-title">&#9873; 名字对比</div>
                <div class="action-bar">
                    <button class="btn btn-secondary btn-small" onclick="clearCompare()">清空</button>
                    <button class="btn btn-secondary btn-small" onclick="autoCompare()">一键对比</button>
                </div>
                <div id="compareList"></div>
                <div class="compare-section" id="compareResult"></div>
            </div>
        </div>

        <div id="page-poem" class="hidden">
            <div class="card">
                <div class="section-title">&#127800; 诗词起名</div>
                <div id="poemList"></div>
            </div>
        </div>

        <footer>
            <p>本应用仅供娱乐参考，起名需综合考虑多方面因素</p>
        </footer>
    </div>

    <div class="share-modal" id="shareModal">
        <div class="share-content">
            <div class="share-title">分享名字</div>
            <div class="share-text" id="shareText"></div>
            <div class="share-buttons">
                <button class="btn btn-secondary" onclick="copyShare()">复制</button>
                <button class="btn btn-primary" onclick="closeShare()">关闭</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const TIANGAN = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
        const DIZHI = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        const WUXING = ['木', '木', '火', '火', '土', '土', '金', '金', '水', '水'];
        const WUXING_RELATION = {
            '木': { '生': '火', '克': '土' },
            '火': { '生': '土', '克': '金' },
            '土': { '生': '金', '克': '水' },
            '金': { '生': '水', '克': '木' },
            '水': { '生': '木', '克': '火' }
        };

        const GUA_64 = {
            '111111': { name: '乾为天', gua: '&#x4DC0;', desc: '象曰：天行健，君子以自强不息。此卦刚健有力，象征天道的运行永不停歇，君子应效法天道，自我强进，永不松懈。' },
            '000000': { name: '坤为地', gua: '&#x4DC3;', desc: '象曰：地势坤，君子以厚德载物。此卦柔顺宽广，象征大地的承载万物，君子应效法大地之德，包容承载世间万物。' },
            '111110': { name: '天风姤', gua: '&#x4DC5;', desc: '象曰：天下有风，姤。后以施命诰四方。此卦天下有风，吹拂万物，象征君子的命令传布四方。' },
            '011111': { name: '泽天夬', gua: '&#x4DC7;', desc: '象曰：泽上于天，夬。君子以施禄及下。此卦湖水蒸发升天，即将化为甘霖普降大地，寓意施恩于下。' },
            '111100': { name: '天山遁', gua: '&#x4DC9;', desc: '象曰：天下有山，遁。君子以远小人，不恶而严。此卦天下有山，山高退避，君子应远离小人，保持威严。' },
            '001111': { name: '泽山咸', gua: '&#x4DCD;', desc: '象曰：山上有泽，咸。君子以虚受人。此卦山上有泽，水气滋润，君子应效法山的谦虚，广泛接受他人的意见。' },
            '111010': { name: '天泽履', gua: '&#x4DCF;', desc: '象曰：上天下泽，履。君子以辨上下。此卦象征天在上泽在下，各安其位，君子应明辨上下之分，谨言慎行。' },
            '010111': { name: '地山谦', gua: '&#x4DD1;', desc: '象曰：地中有山，谦。君子以裒多益寡。此卦地下有山，象征君子谦逊的美德，裒多益寡，称物平施。' },
            '110111': { name: '雷地豫', gua: '&#x4DD3;', desc: '象曰：雷出地奋，豫。先王以作乐崇德。此卦雷声震动大地，万物生机勃发，象征快乐和预备。' },
            '111001': { name: '火地晋', gua: '&#x4DD5;', desc: '象曰：明出地上，晋。君子以自昭明德。此卦太阳从地面升起，光明磊落，君子应效法太阳之德，使自己德行更加光明。' },
            '100111': { name: '天地否', gua: '&#x4DD7;', desc: '象曰：天地不交，否。君子以俭德辟难。此卦天地不相交，象征闭塞不通，君子应收敛德行，避免灾难。' },
            '111011': { name: '风地观', gua: '&#x4DD9;', desc: '象曰：风行地上，观。先王以省方观民设教。此卦风吹拂地面，观察万物，君子应效法风的精神，巡视四方，观察民情。' },
            '110011': { name: '山地剥', gua: '&#x4DDB;', desc: '象曰：山附于地，剥。上以厚下安宅。此卦山体剥落，附于地上，君子应厚待下民，安稳宅第。' },
            '100001': { name: '地雷复', gua: '&#x4DDD;', desc: '象曰：雷在地中，复。先王以至日闭关。此卦雷在地下，象征回复、复生，君子应效法此卦，在至日闭关静修。' },
            '101111': { name: '天雷无妄', gua: '&#x4DDF;', desc: '象曰：天下雷行，物与无妄。此卦象征雷行于天下，万物各守其正，不敢妄为。寓意顺应天道，不可妄动。' },
            '111101': { name: '山天大畜', gua: '&#x4DE1;', desc: '象曰：天在山中，大畜。君子以多识前言往行。此卦山中有天，象征大的蓄积，君子应多多记取前人的言行。' },
            '101110': { name: '山泽损', gua: '&#x4DE3;', desc: '象曰：山下有泽，损。君子以惩忿窒欲。此卦山下有泽，水深山损，君子应克制愤怒，窒塞贪欲。' },
            '011101': { name: '风雷益', gua: '&#x4DE5;', desc: '象曰：风雷，益。君子以见善则迁。此卦风雷相助，象征增益，君子应见善则迁，有过则改。' },
            '100010': { name: '泽风大过', gua: '&#x4DE7;', desc: '象曰：泽灭木，大过。君子以独立不惧。此卦泽水淹没木，象征大的过度，君子应独立不惧，遁世无闷。' },
            '010001': { name: '雷天大壮', gua: '&#x4DE9;', desc: '象曰：雷在天上，大壮。君子以非礼弗履。此卦雷声在天上轰鸣，象征声势浩大，君子应以此自警，不做非礼之事。' },
            '001110': { name: '泽地萃', gua: '&#x4DEB;', desc: '象曰：地中萃聚万物，萃。君子以除戎器。此卦大地聚集，象征会聚，君子应整治兵器，以备不虞。' },
            '011100': { name: '地风升', gua: '&#x4DED;', desc: '象曰：地中生木，升。君子以顺德积小。此卦地上生木，象征上升，君子应顺从道德，积累小善。' },
            '010110': { name: '泽水困', gua: '&#x4DEF;', desc: '象曰：泽无水，困。君子以致命遂志。此卦泽中无水，象征困顿，君子应全力以赴，实现志向。' },
            '011010': { name: '水风井', gua: '&#x4DF1;', desc: '象曰：木上有水，井。君子以劳民劝相。此卦木上有水，象征井水养育万物，君子应勤劳民众，鼓励互相帮助。' },
            '010100': { name: '泽火革', gua: '&#x4DF3;', desc: '象曰：泽中有火，革。君子以治历明时。此卦泽中有火，象征变革，君子应修订历法，明确时节。' },
            '001101': { name: '火风鼎', gua: '&#x4DF5;', desc: '象曰：木上有火，鼎。君子以正位凝命。此卦木上有火，象征鼎立，君子应端正位置，完成使命。' },
            '000111': { name: '震为雷', gua: '&#x4DF7;', desc: '象曰：洊雷震，君子以恐惧修身。此卦雷声连续不断，君子应因恐惧而修身。' },
            '111000': { name: '艮为山', gua: '&#x4DF9;', desc: '象曰：兼山，艮。君子以思不出其位。此卦两山重叠，象征静止，君子应思考不超出自己的位置。' },

        function calcBazi(year, month, day, hour) {
            const tgIndex = (year - 4) % 10;
            const ganZhiYear = TIANGAN[tgIndex] + DIZHI[(year - 4) % 12];
            let monthIdx = DIZHI.indexOf(month);
            let ganZhiMonth = TIANGAN[(tgIndex + monthIdx + 2) % 10] + DIZHI[monthIdx];
            let dayGanIdx = (year * 365 + month * 30 + day + 6) % 10;
            let dayZhiIdx = (year * 365 + month * 30 + day + 9) % 12;
            let ganZhiDay = TIANGAN[dayGanIdx] + DIZHI[dayZhiIdx];
            let hourZhiIdx = DIZHI.indexOf(hour);
            let ganZhiHour = TIANGAN[(dayGanIdx * 2 + hourZhiIdx) % 10] + DIZHI[hourZhiIdx];
            return { year: ganZhiYear, month: ganZhiMonth, day: ganZhiDay, hour: ganZhiHour };
        }

        function getWuxing(gan) {
            const idx = TIANGAN.indexOf(gan);
            return idx >= 0 ? WUXING[idx] : '';

        function analyzeWuxing(bazi) {
            const wuxingCounts = { '木': 0, '火': 0, '土': 0, '金': 0, '水': 0 };
            const bazis = [bazi.year[0], bazi.month[0], bazi.day[0], bazi.hour[0]];
            bazis.forEach(g => {
                const w = getWuxing(g);
                if (w) wuxingCounts[w]++;
            });
            return wuxingCounts;
        }

        function getXiYongShen(wuxingCounts) {
            let max = 0, min = Infinity, strong = '', weak = '';
            for (let w in wuxingCounts) {
                if (wuxingCounts[w] > max) { max = wuxingCounts[w]; strong = w; }
                if (wuxingCounts[w] < min) { min = wuxingCounts[w]; weak = w; }
            }
            for (let w in wuxingCounts) {
                if (w !== strong && wuxingCounts[w] === min) { weak = w; break; }
            }
            const buyong = WUXING_RELATION[strong] ? WUXING_RELATION[strong]['生'] : '';
            const xiyong = WUXING_RELATION[weak] ? WUXING_RELATION[weak]['克'] : '';
            return { buyong, xiyong, strong, weak };
        }

        function calcGua(surname, name1, name2) {
            const total = getCharStrokes(surname) + getCharStrokes(name1) + getCharStrokes(name2);
            const index = total % 64;
            const binary = index.toString(2).padStart(6, '0');
            return GUA_64[binary] || GUA_64['111111'];
        }

        function calcSanCai(surname, name1, name2) {
            const tiange = getCharStrokes(surname) + 1;

            const dige = getCharStrokes(name2) + 1;
            const waige = getCharStrokes(name1) + getCharStrokes(name2);
            const zongge = getCharStrokes(surname) + getCharStrokes(name1) + getCharStrokes(name2);
            return { tiange, renge, dige, waige, zongge };
        }

        function generateNameSuggestions(wuxingInfo, gender, count = 12) {
            const suggestions = [];
            const preferWX = wuxingInfo.xiyong;
            const avoidWX = wuxingInfo.buyong;
            const baseChars = CHAR_WUXING[preferWX] || CHAR_WUXING['木'];
            const pool = gender === '女' ? NAME_POOL_FEMALE : NAME_POOL_MALE;
            const usedNames = new Set();

            for (let i = 0; i < pool.length; i++) {
                const name1 = pool[Math.floor(Math.random() * pool.length)];
                const name2 = baseChars[Math.floor(Math.random() * baseChars.length)];
                const fullName = name1 + name2;
                if (usedNames.has(fullName)) continue;
                usedNames.add(fullName);

                const santi = calcSanCai('张', name1, name2);
                const santiScore = calcTotalScore(santi);
                const yinYunScore = calcYinYun(name1, name2);
                const rankScore = NAME_RANK[name1] || 70;
                const totalScore = Math.round(santiScore * 0.4 + yinYunScore * 0.3 + rankScore * 0.3);

                suggestions.push({
                    name: fullName,
                    score: totalScore,
                    santiScore,
                    yinYunScore,
                    wuxing: preferWX + preferWX,
                    strokes1: getCharStrokes(name1),
                    strokes2: getCharStrokes(name2)
                });

                if (suggestions.length >= count * 2) break;
            }

            return suggestions.sort((a, b) => b.score - a.score).slice(0, count);
        }

                const bestScore = h.suggestions[0] ? h.suggestions[0].score : 0;
                html += `
                    <div class="history-item" onclick="loadHistory(${idx})">
                        <div class="name">${h.surname}** - ${bestName} (${bestScore}分)</div>
                        <div class="date">${date} | ${h.gender} | ${h.bazi.year}</div>
                    </div>
                `;
            });
            document.getElementById('historyList').innerHTML = html;
        }

        function loadHistory(idx) {
            const h = history[idx];
            document.getElementById('surname').value = h.surname;
            document.getElementById('birthDate').value = h.date;
            document.getElementById('birthHour').value = h.hour;
            document.getElementById('gender').value = h.gender;
            currentSurname = h.surname;
            currentBazi = h.bazi;
            currentWuxingInfo = h.wuxingInfo;
            renderNameList(h.suggestions);
            document.getElementById('result').classList.add('show');
            switchNav('input');
            document.querySelectorAll('.nav-btn')[0].classList.add('active');
        }

        function renderPoems() {
            let html = '';
            POEMS.forEach(p => {
                const chars = p.content.replace(/[，。、；：！？""''（）《》【】]/g, '').split('');
                const name1 = chars[Math.floor(Math.random() * chars.length)];
                const name2 = chars[Math.floor(Math.random() * chars.length)];
                html += `
                    <div class="poem-section">
                        <div class="poem-title">${p.title} - ${p.author}</div>
                        <div class="poem-content">${p.content}</div>
                        <div style="margin-top:8px;color:#f6d365;font-size:13px;">推荐名字：${name1}${name2}</div>
                    </div>
                `;
            });
            document.getElementById('poemList').innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCompareList();
        });
    </script>
</body>
</html>
